services:
  web:
    build:
      context: ./php-web
      dockerfile: Dockerfile
    container_name: web-server
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./php-web:/var/www/html
    environment:
      - NODE_API_URL=http://node_api:3000
    depends_on:
      - node_api
  
  node_api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    container_name: node-api
    restart: always
    volumes:
      - ./node-api:/var/www/html
      - /var/www/html/node_modules
    ports:
      - "5000:50"
    depends_on:
      - db
  
  db:
    image: mysql:latest
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: hackathon
      MYSQL_ROOT_PASSWORD: ""
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ""
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
      